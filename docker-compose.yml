# NOTE: Local development infrastructure for triary.
#       Connected loosely to the devcontainer (we share the
#       `triary-network` declared as `external: true`).
#       Bring it up only when you actually need it via `make infra-up`.

services:
  mysql:
    image: mysql:8.0
    container_name: triary-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-triary_development}
      MYSQL_USER: ${MYSQL_USER:-triary}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-triary}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD:-rootpassword}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - triary-network

  mysql-test:
    image: mysql:8.0
    container_name: triary-mysql-test
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_TEST_DATABASE:-triary_test}
      MYSQL_USER: ${MYSQL_USER:-triary}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-triary}
    # NOTE: Mount /var/lib/mysql on tmpfs so the test DB starts from a clean
    #       slate on every run.
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD:-rootpassword}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - triary-network

volumes:
  mysql-data:

networks:
  triary-network:
    external: true

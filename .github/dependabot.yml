version: 2
updates:
  # ---------- Frontend (pnpm) ----------
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    groups:
      # 開発依存とランタイム依存を分けてレビューしやすくする
      dev-dependencies:
        dependency-type: "development"
      runtime-dependencies:
        dependency-type: "production"
    # pnpm.overrides で patch している transitive dep の上流が更新されたら
    # こちらでも気づけるよう、ignore は設定しない方針。

  # ---------- Backend (cargo) ----------
  - package-ecosystem: "cargo"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"

  # ---------- GitHub Actions ----------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"

version: 2
updates:
  # ---------- Frontend (pnpm) ----------
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    groups:
      # NOTE: Split dev and runtime dependencies into separate update PRs so
      #       reviews stay focused.
      dev-dependencies:
        dependency-type: "development"
      runtime-dependencies:
        dependency-type: "production"
    # NOTE: Do not configure `ignore` here on purpose. We want to be notified
    #       whenever an upstream of a transitive dep currently patched via
    #       `pnpm.overrides` ships a fix.

  # ---------- Backend (cargo) ----------
  - package-ecosystem: "cargo"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"

  # ---------- GitHub Actions ----------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"

name: E2E

# 実行時間の長い E2E は PR では回さず、main へのマージ後にのみ実行する。
# CD 導入時に前段として再調整する。
on:
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Playwright の設定ファイルが入るまで e2e ジョブを自動 skip する。
  # `frontend/playwright.config.{ts,js}` がコミットされたら自然に有効化される。
  e2e-detect:
    name: e2e / detect
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if compgen -G "frontend/playwright.config.*" > /dev/null; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::frontend/playwright.config.* が無いため e2e ジョブをスキップします"
          fi

  e2e:
    name: e2e / playwright
    needs: e2e-detect
    if: needs.e2e-detect.outputs.ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: create shared docker network
        run: docker network create triary-network || true

      - name: start local infra
        run: docker compose up -d --wait

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: run migrations
        working-directory: backend
        env:
          DATABASE_URL: mysql://triary:triary@127.0.0.1:3306/triary_development
        run: sqlx migrate run

      - name: build & start backend
        working-directory: backend
        env:
          DATABASE_URL: mysql://triary:triary@127.0.0.1:3306/triary_development
        run: |
          cargo build --release
          nohup ./target/release/triary-backend > backend.log 2>&1 &

      - name: build & start frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm exec vite build
          nohup pnpm exec vite preview --host 0.0.0.0 --port 3000 > frontend.log 2>&1 &

      - name: install playwright
        working-directory: frontend
        run: pnpm exec playwright install --with-deps

      - name: run playwright e2e
        working-directory: frontend
        run: pnpm exec playwright test

      - name: upload playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 14

      - name: stop local infra
        if: always()
        run: docker compose down -v

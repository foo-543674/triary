name: AI Review

# NOTE: Run code review on PRs via the foo-543674/foo-skills code-reviewer
#       agent.
#       - Auto-runs on PR open / update.
#       - Can also be triggered manually for an arbitrary PR via
#         workflow_dispatch.
#       - foo-skills is cloned from main at run time, so we always pick up the
#         latest revision.
#
# ============================================================
# NOTE: Authentication uses the Claude Max plan OAuth token (avoids per-call
#       billing).
# ============================================================
# GitHub Secrets: CLAUDE_CODE_OAUTH_TOKEN
#
# NOTE: Token rotation procedure (when the existing token expires or auth
#       starts failing):
#   1. Run `claude setup-token` from a local Claude Code CLI logged in with
#      the Max-plan account.
#   2. Complete the OAuth flow in the browser and copy the long-lived token.
#   3. Update `CLAUDE_CODE_OAUTH_TOKEN` under the repo's
#      Settings -> Secrets and variables -> Actions.
#   4. Re-trigger the failing PR via workflow_dispatch or by pushing an empty
#      commit.
#
# NOTE: Operational caveats:
#       - This token consumes the Max plan flat-rate quota and rate limits.
#         Concurrent CI runs compete with local Claude Code work over the
#         same five-hour window, so use `[skip ai-review]` in the PR title
#         to skip this job when needed.
#       - To fall back to per-call billing (API key), replace
#         `claude_code_oauth_token` with
#         `anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}`.
# ============================================================

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: number

concurrency:
  group: ai-review-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  ai-review:
    name: ai / code review (foo-skills)
    # NOTE: Skip draft PRs, PRs whose title contains `[skip ai-review]`, and
    #       PRs opened by dependabot (dependabot only edits dependency
    #       manifests / lockfiles / workflow `uses:` lines, which the human
    #       reviewer handles together with the `pnpm.overrides` ledger in
    #       `.contexts/security-overrides.md`). workflow_dispatch always runs.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.draft == false &&
       github.event.pull_request.user.login != 'dependabot[bot]' &&
       !contains(github.event.pull_request.title, '[skip ai-review]'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      issues: write
      # NOTE: anthropics/claude-code-action@v1 authenticates via the OIDC
      #       token, so id-token: write is required.
      id-token: write
    env:
      PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
    steps:
      # NOTE: Resolve PR metadata uniformly so the workflow_dispatch path
      #       works the same as the auto trigger.
      - name: resolve PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            data=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}")
            echo "head_sha=$(echo "$data" | jq -r .head.sha)" >> "$GITHUB_OUTPUT"
            echo "base_ref=$(echo "$data" | jq -r .base.ref)" >> "$GITHUB_OUTPUT"
          else
            echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            echo "base_ref=${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - name: checkout PR head
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: fetch base branch
        run: |
          git fetch origin \
            "${{ steps.pr.outputs.base_ref }}:refs/remotes/origin/${{ steps.pr.outputs.base_ref }}"

      # NOTE: Pull foo-skills from main at run time. We intentionally do not
      #       pin a tag (per repo owner preference) and rely on the latest
      #       revision instead. The repository ships a proper plugin layout
      #       (`.claude-plugin/plugin.json`), so Claude Code can load it as a
      #       local plugin via `--plugin-dir`, which also wires
      #       `${CLAUDE_PLUGIN_ROOT}` correctly.
      - name: checkout foo-skills (latest main)
        uses: actions/checkout@v6
        with:
          repository: foo-543674/foo-skills
          path: .foo-skills
          ref: main

      - name: run claude code review
        uses: anthropics/claude-code-action@v1
        # NOTE: When the head commit was authored by the Copilot Coding
        #       Agent, `github.actor` is the literal string `Copilot`
        #       (no `[bot]` suffix, not a real GitHub user). The action's
        #       `checkHumanActor` (src/github/validation/actor.ts) calls
        #       `octokit.users.getByUsername({ username: actor })`
        #       *before* consulting `allowed_bots`, so the run dies with
        #       `GET /users/Copilot - 404` / `Action failed with error:
        #       Not Found`. Upstream issue #900 is open / unfixed at
        #       v1.0.107. `@actions/github`'s Context reads
        #       `process.env.GITHUB_ACTOR`, so overriding it here makes
        #       the lookup target the repo owner instead, which exists
        #       and resolves as type "User" — `checkHumanActor` then
        #       short-circuits as a human and never touches the bot
        #       branch. We only override when the original actor is
        #       Copilot so human runs still report the real actor.
        #       ASSUMPTION: personal repository (owner is type "User").
        #       If this repo is ever transferred to an organization, the
        #       `github.repository_owner` fallback may resolve to an
        #       Organization account instead of a User, breaking the same
        #       `checkHumanActor` lookup it is meant to bypass. In that case
        #       remove this override or hard-code the owner's user login.
        env:
          GITHUB_ACTOR: ${{ github.actor == 'Copilot' && github.repository_owner || github.actor }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # NOTE: Pass GITHUB_TOKEN explicitly so the action skips the
          #       Anthropic-side App-token exchange. That exchange checks
          #       the OIDC `actor` (= commit author) for repo write access,
          #       which fails with `App token exchange failed: 401
          #       Unauthorized - User does not have write access on this
          #       repository` whenever a bot account such as Copilot
          #       (`copilot-swe-agent[bot]`) authored the head commit, even
          #       though `triggering_actor` is the repo owner. Using the
          #       workflow-scoped GITHUB_TOKEN sidesteps that check and
          #       relies on the `permissions:` block declared above for
          #       repo access. The OIDC token is unaffected by the
          #       GITHUB_ACTOR env override above (OIDC is signed by the
          #       runner before the step runs), so this bypass is still
          #       required even with the actor override in place.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # NOTE: Belt-and-suspenders for the permission check
          #       (`octokit.repos.getCollaboratorPermissionLevel`).
          #       The GITHUB_ACTOR override above already redirects this
          #       lookup to the repo owner (who has write access), so this
          #       input is likely redundant — but kept because we cannot
          #       confirm from the v1 source that the permission step
          #       reads `context.actor` rather than another identity.
          #       Drop this once a real Copilot run proves it unnecessary.
          allowed_non_write_users: "Copilot"
          # NOTE: `--plugin-dir` loads foo-skills as a local plugin so the
          #       agent can be addressed as `foo-skills:code-reviewer`.
          claude_args: "--plugin-dir ./.foo-skills"
          prompt: |
            Run a code review against this PR and write the result to
            `ai-review-report.md`. Always produce the file even when there
            are zero findings. The review report format itself is defined
            by the agent; do not override it here.

            Write the review report body in Japanese. (The repository
            owner reads reviews in Japanese, even though the codebase and
            this prompt are in English.)

            ## Review target
            - Base branch: `origin/${{ steps.pr.outputs.base_ref }}`
            - Helpful diff commands:
              - `git diff --name-only origin/${{ steps.pr.outputs.base_ref }}...HEAD`
              - `git diff origin/${{ steps.pr.outputs.base_ref }}...HEAD`

            ## How to run
            Spawn the `foo-skills:code-reviewer` subagent via the Task tool.
            The foo-skills plugin is already loaded via `--plugin-dir`, so
            internal references that use `${CLAUDE_PLUGIN_ROOT}` resolve as
            expected.

            ## Project-specific context
            - Backend: Rust + Axum + MySQL (`backend/`)
            - Frontend: TypeScript + SolidJS + Tailwind + CSS Modules (`frontend/`)
            - Migrations are plain SQL files under `backend/migrations/`
            - The API is schema-first (`openapi/`)
            - Frontend lint/format is Biome only (no ESLint, no Prettier)
            - Integration tests are language-agnostic (Postman / Newman)
            - See `CLAUDE.md` for the full project guide

            ## Constraints
            - Do not modify code, create commits, or post PR comments under
              any circumstances.

      # NOTE: When `ai-review-report.md` is missing we cannot tell whether
      #       the run was clean (no findings) or whether the workflow itself
      #       broke. Verify the file exists explicitly and fail the job
      #       loudly when it does not, regardless of the agent's exit status.
      - name: ensure review report exists
        if: always()
        run: |
          if [ ! -f ai-review-report.md ]; then
            echo "::error::ai-review-report.md was not generated."
            echo "::error::The agent is required to write a report even with zero findings, so this means the workflow itself is broken."
            echo "::error::Inspect the 'run claude code review' step logs above."
            exit 1
          fi
          echo "ai-review-report.md is present ($(wc -c < ai-review-report.md) bytes)"

      - name: post review as sticky PR comment
        if: always() && hashFiles('ai-review-report.md') != ''
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: ai-review-foo-skills
          number: ${{ env.PR_NUMBER }}
          path: ai-review-report.md
